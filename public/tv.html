<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Retro Web Console</title>
    <link href="/assets/css/common.css" rel="stylesheet">
    <link href="/assets/css/lobby.css" rel="stylesheet">
    <link href="/assets/css/gameplay.css" rel="stylesheet">
    <link href="/fonts/press-start-2p/index.css" rel="stylesheet">
    <link rel="icon" href="/assets/favicon/favicon32.png" type="image/x-icon">
    <script src="/cores/browserfs.min.js" defer></script>
    <script src="/assets/js/gameplay.js?v=1.0.7" defer></script>
    <script src="/assets/js/lobby.js" defer></script>
</head>
<body>

    <!-- Background Music -->
    <audio id="lobby-audio" src="/assets/audio/lobby.mp3" loop preload="auto"></audio>

    <!-- Player Gamepad Status HUD -->
    <div class="player-status-container">
        <div class="status-chip" id="p1-chip"><div class="indicator"></div> <span id="p1-name">P1: OFFLINE</span></div>
        <div class="status-chip" id="p2-chip"><div class="indicator"></div> <span id="p2-name">P2: OFFLINE</span></div>
    </div>

    <!-- Lobby View -->
    <div id="lobby-view">
        <div class="hero-spotlight">
            <img class="lobby-logo" src="/assets/favicon/favicon32.png" alt="System Logo">
            <img id="hero-bg" src="">
            <div class="hero-content">
                <h1 id="hero-title">AWAITING SELECTION</h1>
                <div id="hero-meta">CONSOLE | YEAR</div>
                <p id="hero-desc">Hover over a game card below to reveal the official metadata configurations.</p>
            </div>
        </div>
        <div class="lobby-controls">
            <span style="font-size: 8px; color: #8197a4; margin-right: 15px;">SORT BY:</span>
            <select id="sort-select" class="sort-select" onchange="sortLibrary(this.value)">
                <option value="title_asc">TITLE (A-Z)</option>
                <option value="title_desc">TITLE (Z-A)</option>
                <option value="console">SYSTEM</option>
                <option value="year_desc">NEWEST</option>
                <option value="year_asc">OLDEST</option>
            </select>
        </div>
        <div class="deck-wrapper">
            <button id="scroll-left" class="scroll-btn" onclick="scrollDeck(-1)">◀</button>
            <div class="curated-rows" id="game-rows"></div>
            <button id="scroll-right" class="scroll-btn" onclick="scrollDeck(1)">▶</button>
        </div>
    </div>

    <!-- Gameplay View -->
    <div id="gameplay-view" class="webos-clean-ui">
        <div id="game-panel">
            <div id="game-div"></div>
        </div>
        
        <!-- Custom Gameplay Pause Menu Overlay -->
        <div id="gameplay-menu-overlay" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 14, 20, 0.85); z-index: 1000; justify-content: center; align-items: center; font-family: 'Courier New', Courier, monospace;">
            <div class="menu-box" style="background: #161a22; padding: 30px; border-radius: 8px; border: 2px solid #00a8e1; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 20px rgba(0, 168, 225, 0.3); min-width: 320px;">
                <div class="menu-title" style="font-size: 16px; color: #00a8e1; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 3px; font-weight: bold;">SYSTEM PAUSED</div>
                <div class="menu-options" id="menu-options-container" style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
                    <div class="menu-item active" data-option="resume" style="font-size: 12px; color: #00a8e1; padding: 10px; cursor: pointer; text-align: center; font-weight: bold; border: 1px solid #00a8e1; border-radius: 4px; background: rgba(0, 168, 225, 0.1);">> RESUME GAME <</div>
                    <div class="menu-item" data-option="save" style="font-size: 12px; color: #8197a4; padding: 10px; cursor: pointer; text-align: center; border: 1px solid transparent;">SAVE STATE</div>
                    <div class="menu-item" data-option="load" style="font-size: 12px; color: #8197a4; padding: 10px; cursor: pointer; text-align: center; border: 1px solid transparent;">LOAD STATE</div>
                    <div class="menu-item" data-option="slot" style="font-size: 12px; color: #8197a4; padding: 10px; cursor: pointer; text-align: center; border: 1px solid transparent;">SAVE SLOT: [ 1 ]</div>
                    <div class="menu-item" data-option="restart" style="font-size: 12px; color: #8197a4; padding: 10px; cursor: pointer; text-align: center; border: 1px solid transparent;">RESTART GAME</div>
                    <div class="menu-item" data-option="exit" style="font-size: 12px; color: #ff4a5a; padding: 10px; cursor: pointer; text-align: center; border: 1px solid transparent;">EXIT GAME</div>
                </div>
            </div>
        </div>
        <div class="system-footer">
            <button class="btn btn-danger" onclick="ApplicationState.exitGameplay()">[EXIT GAME]</button>
        </div>
    </div>




</body>
</html>
